name: Loki — Helm Deploy

# ─────────────────────────────────────────────────────────────
# Trigger: runs when a PR is merged / push lands on main
# Only fires when files inside THIS repo actually change
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "**"                           # any file in this repo
      - "!.github/workflows/**"        # except workflow changes alone
      - ".github/workflows/deploy.yml" # but DO re-run if this file itself changes

# Cancel any in-progress deploy if a new push arrives
concurrency:
  group: loki-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 — Lint the chart on the GitHub runner
  # ──────────────────────────────────────────────────────────
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Loki chart
        run: helm lint .

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Deploy Loki via SSH using microk8s helm3
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy Loki
    runs-on: ubuntu-latest
    needs: lint
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Print deploy info in GitHub UI ──────────────────
      - name: Deploy info
        run: |
          echo "## 🚀 Loki Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

      # ── Setup SSH ────────────────────────────────────────
      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # ── Set up Helm on Runner (for values parsing) ───────
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      # ── Read namespace from local values.yaml ────────────
      - name: Read namespace
        id: vars
        run: |
          NAMESPACE=$(helm show values . | grep '^namespace:' | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT
          echo "Deploying to namespace: $NAMESPACE"

      # ── Copy chart files to server ───────────────────────
      - name: Upload chart to server
        run: |
          scp -o StrictHostKeyChecking=no -r . \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/btc-loki-helm"

      # ── Ensure namespace exists on server ────────────────
      - name: Ensure namespace exists
        run: |
          ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "microk8s kubectl get namespace ${{ steps.vars.outputs.namespace }} 2>/dev/null \
             || microk8s kubectl create namespace ${{ steps.vars.outputs.namespace }}"

      # ── Run microk8s helm3 upgrade --install on server ───
      - name: Helm upgrade/install via microk8s helm3
        run: |
          ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
              microk8s helm3 upgrade --install btc-loki-helm /tmp/btc-loki-helm \
                --namespace ${{ steps.vars.outputs.namespace }} \
                --atomic \
                --timeout 300s \
                --cleanup-on-fail
            "

      # ── Rollout status check for Loki ────────────────────
      - name: Rollout status
        run: |
          ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
              NAMESPACE=${{ steps.vars.outputs.namespace }}
              echo 'Waiting for Loki rollout...'
              microk8s kubectl rollout status deployment/btc-loki-helm -n \$NAMESPACE --timeout=300s
              echo '✅ Loki rollout complete'
            "

      # ── Cleanup chart from server temp ───────────────────
      - name: Cleanup chart from server
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf /tmp/btc-loki-helm" || true

      # ── Cleanup SSH keys ──────────────────────────────────
      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh

      # ── Final status in GitHub summary ───────────────────
      - name: Result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Loki deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Loki deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
